<!-- Footer Component -->

<script>
        // Micro-interactions for form focus effects
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
                input.parentElement.classList.add('transition-transform');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Toggle password visibility
        const togglePass = document.querySelector('button[type="button"]');
        if(togglePass) {
            togglePass.addEventListener('click', () => {
                const passInput = togglePass.previousElementSibling;
                const icon = togglePass.querySelector('.material-symbols-outlined');
                if (passInput.type === 'password') {
                    passInput.type = 'text';
                    icon.textContent = 'visibility_off';
                } else {
                    passInput.type = 'password';
                    icon.textContent = 'visibility';
                }
            });
        }
    </script>
